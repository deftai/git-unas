name: Release .deb

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm  # native ARM64 — eliminates x86→arm64 cross-compilation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dpkg-dev
        run: sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: scripts/build-deb.sh --arch arm64 --version "${{ steps.version.outputs.version }}"

      - name: Verify .deb
        run: |
          DEB="dist/git-unas_${{ steps.version.outputs.version }}_arm64.deb"
          echo "=== dpkg-deb info ==="
          dpkg-deb --info "$DEB"
          echo "=== contents ==="
          dpkg-deb --contents "$DEB"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/git-unas_${{ steps.version.outputs.version }}_arm64.deb
          body: |
            ## Install

            ### One-line (recommended)
            ```sh
            curl -fsSL https://raw.githubusercontent.com/demiurge28/git-unas/main/gh-pages/install.sh | sh
            ```

            ### Manual .deb
            ```sh
            VER=${{ steps.version.outputs.version }}
            curl -fsSL -O https://github.com/demiurge28/git-unas/releases/download/v${VER}/git-unas_${VER}_arm64.deb
            dpkg -i git-unas_${VER}_arm64.deb
            ```

            ### Uninstall
            ```sh
            apt-get remove git-unas          # stops service, reverts nginx
            apt-get purge  git-unas          # also removes /etc/git-unas/
            # Full purge including recovery layer:
            rm -rf /data/git-unas /etc/cron.d/git-unas-*
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
